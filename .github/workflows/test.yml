name: test

on:
  workflow_dispatch:
  schedule:
    # Nightly at 00:00 UTC, only for Playwright beta
    - cron: '0 0 * * *'
  push:
    branches: ['**']
    paths:
      - '.github/workflows/test.yml'
      - 'src/**'
      - 'test/**'
      - 'package*.json'
      - 'tsconfig*.json'
      - '.npmrc'
  pull_request:
    branches: [main]
    paths:
      # no way to avoid repeating the paths here
      - '.github/workflows/test.yml'
      - 'src/**'
      - 'test/**'
      - 'package*.json'
      - 'tsconfig*.json'
      - '.npmrc'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIN_PW_VERSION: '1.45'

jobs:
  get-pw-versions:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - id: get-versions
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            versions='[]'
          else
            versions=$(node scripts/get-pw-versions.ts $MIN_PW_VERSION)
          fi
          versions=$(node -e "const v=$versions; v.push('beta'); console.log(JSON.stringify(v));")
          echo "versions=$versions" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-24.04
    needs: get-pw-versions
    timeout-minutes: 5
    strategy:
      matrix:
        playwright-version: ${{ fromJson(needs.get-pw-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@v6
      - name: Set Node version
        id: node-version
        # Playwright <= 1.52 hangs on Node 24 due to require(esm).
        # Use Node 22 for those versions.
        run: |
          if [[ "${{ matrix.playwright-version }}" =~ ^1\.(4|5[012]) ]]; then
            echo "version=22" >> $GITHUB_OUTPUT
          else
            echo "version=24" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          cache: 'npm'
      - run: npm ci
      - run: npm install --no-save @playwright/test@${{ matrix.playwright-version }}
        env:
          npm_config_min_release_age: 0
      - run: npx playwright install --with-deps chromium
      - run: |
          npm run test:e2e
          npm run test:timings
          npm run test:merge
      # test:lanes are heavy, run only in the latest pw
      - if: matrix.playwright-version == '1.59' || matrix.playwright-version == 'beta'
        run: |
          npm run test:lanes

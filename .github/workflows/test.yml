name: test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  MIN_PW_VERSION: '1.45'

jobs:
  get-pw-versions:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - id: get-versions
        run: echo "versions=$(npx tsx scripts/get-pw-versions.ts $MIN_PW_VERSION)" >> $GITHUB_OUTPUT

  test:
    needs: get-pw-versions
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        playwright-version: ${{ fromJson(needs.get-pw-versions.outputs.versions) }}
        include:
          - playwright-version: beta
    steps:
      - uses: actions/checkout@v6
      - id: node-version
        # Playwright <= 1.52 hangs on Node 24 due to require(esm).
        # Use Node 22 for those versions.
        run: |
          if [[ "${{ matrix.playwright-version }}" =~ ^1\.(4|5[012]) ]]; then
            echo "version=22" >> $GITHUB_OUTPUT
          else
            echo "version=24" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          cache: 'npm'
      - run: npm ci
      - run: npm install --no-save @playwright/test@${{ matrix.playwright-version }}
        env:
          npm_config_min_release_age: 0
      - run: npx playwright install --with-deps chromium
      - run: npm run test:all
